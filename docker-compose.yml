version: '3.8'

services:
  web-generate-qrcode-dev:
    build:
      context: .
      target: development
    container_name: parkfinder-kiosk-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

    command: npm run dev -- --host
